name: Tests & Deploy

on:
  schedule:
    - cron: '0 0 * * *'  # daily at midnight UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - run: npm test

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    env:
      TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Recreate .env file
        run: |
          echo "${{ secrets.ENV_FILE_CONTENT }}" | base64 --decode > .env
          ls -la
          cat .env | wc -l      # Count lines in .env (should be > 0)

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  security:
    name: Security checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      # TD-011: npm audit — fail on HIGH or CRITICAL vulnerabilities in production deps.
      # --omit=dev excludes devDependencies (Capacitor CLI contains tar/uuid HIGH vulns
      # with no upstream fix; they are build-time only and never run on Cloud Run).
      - name: npm audit (HIGH/CRITICAL gate — production deps)
        run: npm audit --audit-level=high --omit=dev

      # TD-012: Bundle analysis — ensure backend-only secrets never appear in dist/
      - name: Build frontend bundle
        run: npm run build

      - name: Scan bundle for leaked secrets
        run: |
          echo "Scanning dist/assets/*.js for backend-only env var names and process.env..."
          FOUND=0
          PATTERNS=(
            "TRADES_API_KEY"
            "HRW_API_KEY"
            "ASBESTOS_API_KEY"
            "CLOUD_RUN_ORIGIN"
            "process\\.env"
          )
          for pattern in "${PATTERNS[@]}"; do
            if grep -rl "$pattern" dist/assets/*.js 2>/dev/null | grep -q .; then
              echo "FAIL: Pattern '$pattern' found in bundle — backend secret leaked into frontend build"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "Bundle analysis failed. Review vite.config.js define block and remove any process.env references that expose backend-only variables."
            exit 1
          fi
          echo "Bundle analysis passed — no backend secrets found in dist/."

      # TD-010: Secret scanning — gitleaks with grep-based fallback
      - name: Install gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.21.2_linux_x64.tar.gz
          echo "gitleaks installed: $(./gitleaks version)"

      - name: Secret scan (gitleaks)
        run: |
          # .gitleaks.toml excludes node_modules, dist, .env, and e2e/.auth
          if ./gitleaks detect --source . --no-git --config .gitleaks.toml --exit-code 1; then
            echo "gitleaks: no secrets detected."
          else
            GITLEAKS_EXIT=$?
            if [ "$GITLEAKS_EXIT" -eq 1 ]; then
              echo "FAIL: gitleaks detected potential secrets in the source tree."
              exit 1
            fi
            echo "gitleaks unavailable or encountered an error — running grep-based fallback scan..."
            # Fallback: grep for common secret patterns (long hex/base64 strings near key names)
            FOUND=0
            if grep -rn \
                --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" \
                --include="*.json" --include="*.env*" --include="*.yml" --include="*.yaml" \
                --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=.git \
                -E "(API_KEY|API_SECRET|CLIENT_SECRET|PASSWORD|TOKEN)\s*[:=]\s*['\"]?[A-Fa-f0-9]{20,}" \
                . 2>/dev/null; then
              echo "FAIL: grep fallback found patterns resembling real secrets."
              FOUND=1
            fi
            if [ "$FOUND" -eq 1 ]; then
              exit 1
            fi
            echo "Grep-based fallback scan passed."
          fi

  deploy:
    name: Deploy to Production
    needs: [unit, e2e, security]
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Recreate .env file
        run: echo "${{ secrets.ENV_FILE_CONTENT }}" | base64 --decode > .env

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Deploy to Google Cloud Run'
        run: |
          chmod +x deploy-gcp.sh
          # The auth action automatically configures gcloud for the project
          ./deploy-gcp.sh

      - name: Create release tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="v$(date +'%Y.%m.%d')-${SHORT_SHA}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

  notify:
    name: Notify on failure
    needs: [unit, e2e, security]
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[${{ github.repository }}] Build/Test failed — deploy blocked"
          to: ${{ secrets.MAIL_TO }}
          from: TradieCheck CI <${{ secrets.MAIL_USERNAME }}>
          body: |
            Tests failed on the main branch. Production deploy was blocked.

            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Commit     : ${{ github.sha }}
            Author     : ${{ github.actor }}
            Message    : ${{ github.event.head_commit.message }}

            View the failed run:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
